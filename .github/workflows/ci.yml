name: CI Pipeline

on:
  push:
    branches: [ main, develop, epic/figures ]
  pull_request:
    branches: [ main, develop ]

jobs:
  checkstyle:
    name: Checkstyle (Google Java Style)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'

      - name: Run Checkstyle
        run: gradle checkstyleMain --stacktrace

  build:
    name: Build JAR
    runs-on: ubuntu-latest
    needs: checkstyle
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'

      - name: Build with Gradle
        run: gradle clean build --stacktrace --info --build-cache

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: minijam-jar
          path: build/libs/*.jar
          retention-days: 1

  test:
    name: Test (Mock)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Mock test stage
        run: echo "✅ Tests passed (mock stage)"

  deploy:
    name: Deploy (Mock)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Mock deploy stage
        run: echo "🚀 Deployed successfully (mock stage)"
