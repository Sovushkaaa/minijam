name: CI Pipeline

on:
  push:
    branches: [ main, develop, epic/* ]
  pull_request:
    branches: [ main, develop, epic/* ]

jobs:
  checkstyle:
    name: Checkstyle (Google Java Style)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'

      - name: Run Checkstyle
        run: gradle checkstyleMain --stacktrace

  pr-size-check:
    name: Проверка размера PR
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run PR size check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python main.py \
            --repo ${{ github.repository }} \
            --token ${{ secrets.GITHUB_TOKEN }} \
            --pr-id ${{ github.event.pull_request.number }}

  epic-description:
    name: Обновление описания эпика
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' &&
      startsWith(github.head_ref, 'feature/') &&
      startsWith(github.base_ref, 'epic/')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Update epic description
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python epic_description.py \
            --repo ${{ github.repository }} \
            --token ${{ secrets.GITHUB_TOKEN }} \
            --pr-id ${{ github.event.pull_request.number }}

  build:
    name: Build JAR
    runs-on: ubuntu-latest
    needs: [checkstyle, pr-size-check]
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.action != 'closed')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'

      - name: Build with Gradle
        run: gradle clean build -x test -x uitest -x integrationTest --stacktrace --info --build-cache

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: minijam-jar
          path: build/libs/*.jar
          retention-days: 1

  test:
    name: Test (Mock)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Mock test stage
        run: echo "✅ Tests passed (mock stage)"

  deploy:
    name: Deploy (Mock)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Mock deploy stage
        run: echo "🚀 Deployed successfully (mock stage)"
