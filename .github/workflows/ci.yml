name: CI Pipeline

on:
  push:
    branches: [ main, develop, epic/figures ]
  pull_request:
    branches: [ main, develop ]

jobs:
  checkstyle:
    name: Checkstyle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew checkstyle --stacktrace

  build:
    name: Build JAR
    runs-on: ubuntu-latest
    needs: checkstyle
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew clean build --stacktrace --info --build-cache
      - uses: actions/upload-artifact@v4
        with:
          name: minijam-jar
          path: build/libs/*.jar
          retention-days: 1

  test:
    name: Test (Mock)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - run: echo "Tests passed (mock)"

  deploy:
    name: Deploy (Mock)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - run: echo "Deployed successfully (mock)"
