 */

plugins {
    // Apply the application plugin to add support for building a CLI application in Java.
    id 'application'
    id 'checkstyle'
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}

dependencies {
    // Use JUnit Jupiter for testing.
    testImplementation 'org.junit.jupiter:junit-jupiter:5.9.3'
    testImplementation 'org.assertj:assertj-swing-junit:3.17.1'

    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

    // This dependency is used by the application.
    implementation 'com.google.guava:guava:32.1.1-jre'
}

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

application {
    // Define the main class for the application.
    mainClass = 'minijam.CMainForm'
}

jar {
    manifest {
        attributes 'Main-Class': 'minijam.CMainForm'
    }
    from configurations.compileClasspath.collect { it.isDirectory() ? it : zipTree(it) }
}

//-----------------------------------
// unit test
//-----------------------------------

tasks.named('test') {
    // Use JUnit Platform for unit tests.
    useJUnitPlatform()
}

//-----------------------------------
// checkstyle
//-----------------------------------

checkstyle {
    toolVersion = '10.12.1'
    config = rootProject.resources.text.fromUri("https://raw.githubusercontent.com/checkstyle/checkstyle/checkstyle-10.12.1/src/main/resources/google_checks.xml")
    ignoreFailures = false
    maxWarnings = 0
}

sourceSets {
    uiTest {
        java.srcDir file('src/test/java/UITest')
        compileClasspath += sourceSets.main.output + configurations.testRuntimeClasspath
        runtimeClasspath += output + compileClasspath
    }

    integrationTest {
        java.srcDir file('src/test/java/IntegrationTest')
        compileClasspath += sourceSets.main.output + configurations.testRuntimeClasspath
        runtimeClasspath += output + compileClasspath
    }
}

configurations {
    uiTestImplementation.extendsFrom testImplementation
    uiTestRuntimeOnly.extendsFrom testRuntimeOnly
}

//-----------------------------------
// ui test
//-----------------------------------

task uitest(type: Test) {
    description = 'Run Swing UI tests'
    group = 'verification'

    testClassesDirs = sourceSets.uiTest.output.classesDirs
    classpath = sourceSets.uiTest.runtimeClasspath

    useJUnitPlatform()
}

//-----------------------------------
// integration test
//-----------------------------------

task integrationTest(type: Test) {
    description = "Runs the integration tests."
    group = "verification"
    testClassesDirs = sourceSets.integrationTest.output.classesDirs
    classpath = sourceSets.integrationTest.runtimeClasspath
    useJUnitPlatform()
}

